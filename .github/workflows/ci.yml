name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linter
      run: npm run lint
    
    - name: Run type check (if TypeScript)
      run: npm run type-check || echo "No TypeScript configured"
      continue-on-error: true
    
    - name: Run tests
      run: npm test
    
    - name: Build application
      run: npm run build
      env:
        VITE_APP_NAME: Milan AI
        VITE_APP_URL: https://www.milanai.org
        VITE_ENABLE_ANALYTICS: true
        VITE_ENABLE_ERROR_REPORTING: true
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files-${{ matrix.node-version }}
        path: dist/
        retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
      env:
        VITE_APP_NAME: Milan AI
        VITE_APP_URL: https://www.milanai.org
        VITE_ENABLE_ANALYTICS: false
        VITE_ENABLE_ERROR_REPORTING: false
    
    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v10
      with:
        configPath: './lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true

  security:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run security audit
      run: npm audit --audit-level moderate
    
    - name: Check for known vulnerabilities
      run: npx audit-ci --moderate

  deploy-preview:
    runs-on: ubuntu-latest
    needs: [test, lighthouse, security]
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
      env:
        VITE_APP_NAME: Milan AI
        VITE_APP_URL: https://www.milanai.org
        VITE_ENABLE_ANALYTICS: true
        VITE_ENABLE_ERROR_REPORTING: true
    
    - name: Deploy to preview
      run: echo "Deploy to preview environment"
      # Add your preview deployment logic here

  deploy-production:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
      env:
        VITE_APP_NAME: Milan AI
        VITE_APP_URL: https://www.milanai.org
        VITE_ENABLE_ANALYTICS: true
        VITE_ENABLE_ERROR_REPORTING: true
    
    - name: Deploy to production
      run: echo "Deploy to production environment"
      # Add your production deployment logic here
    
    - name: Notify deployment
      run: echo "Production deployment completed successfully"